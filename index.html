<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
  html, body { margin: 0; padding: 0; background: #111; color: #eee; font-family: system-ui, sans-serif; height: 100%; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  h1 { margin: 12px 0 8px; font-weight: 600; letter-spacing: 1px; }
  #wrap { position: relative; }
  canvas { background: #000; display: block; border: 2px solid #4caf50; box-shadow: 0 0 24px rgba(76,175,80,.35); }
  #hud { margin-top: 10px; font-size: 14px; opacity: .85; }
  #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; background: rgba(0,0,0,.75); color: #fff; text-align: center; }
  #overlay.hidden { display: none; }
  #overlay button { margin-top: 12px; padding: 8px 16px; background: #4caf50; color: #fff; border: 0; border-radius: 4px; cursor: pointer; font-size: 14px; }
  #overlay button:hover { background: #43a047; }
</style>
</head>
<body>
  <h1>🐍 Snake</h1>
  <div id="wrap">
    <canvas id="game" width="400" height="400"></canvas>
    <div id="overlay">
      <div id="overlayMsg">Press SPACE or tap Start to play</div>
      <button id="startBtn">Start</button>
    </div>
  </div>
  <div id="hud">Score: <span id="score">0</span> &nbsp;·&nbsp; Use arrow keys / WASD. Space to pause.</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const overlay = document.getElementById('overlay');
  const overlayMsg = document.getElementById('overlayMsg');
  const startBtn = document.getElementById('startBtn');

  const GRID = 20;            // 20x20 cells on a 400x400 canvas
  const CELL = canvas.width / GRID;
  const TICK_MS = 110;        // game speed

  let snake, dir, nextDir, food, score, alive, timer, paused;

  function reset() {
    snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
    dir = {x: 1, y: 0};
    nextDir = {x: 1, y: 0};
    score = 0;
    alive = true;
    paused = false;
    placeFood();
    scoreEl.textContent = score;
    draw();
  }

  function placeFood() {
    while (true) {
      const f = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
      if (!snake.some(s => s.x === f.x && s.y === f.y)) { food = f; return; }
    }
  }

  function step() {
    if (!alive || paused) return;
    // prevent 180° reversal
    if (nextDir.x !== -dir.x || nextDir.y !== -dir.y) dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall collision
    if (head.x < 0 || head.y < 0 || head.x >= GRID || head.y >= GRID) return die();
    // self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) return die();

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = score;
      placeFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function die() {
    alive = false;
    overlayMsg.innerHTML = `Game over — score <b>${score}</b>`;
    startBtn.textContent = 'Restart';
    overlay.classList.remove('hidden');
  }

  function draw() {
    // background
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // subtle grid
    ctx.strokeStyle = '#111';
    for (let i = 1; i < GRID; i++) {
      ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(canvas.width, i*CELL); ctx.stroke();
    }

    // food
    ctx.fillStyle = '#e53935';
    ctx.fillRect(food.x*CELL+2, food.y*CELL+2, CELL-4, CELL-4);

    // snake
    snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? '#4caf50' : '#2e7d32';
      ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
    });
  }

  function setDir(x, y) {
    if (!alive) return;
    if (x === -dir.x && y === -dir.y) return; // ignore reversal
    nextDir = {x, y};
  }

  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'arrowup' || k === 'w') { setDir(0, -1); e.preventDefault(); }
    else if (k === 'arrowdown' || k === 's') { setDir(0, 1); e.preventDefault(); }
    else if (k === 'arrowleft' || k === 'a') { setDir(-1, 0); e.preventDefault(); }
    else if (k === 'arrowright' || k === 'd') { setDir(1, 0); e.preventDefault(); }
    else if (k === ' ') {
      if (!alive) return;
      paused = !paused;
      overlayMsg.textContent = paused ? 'Paused — press SPACE to resume' : '';
      overlay.classList.toggle('hidden', !paused);
      e.preventDefault();
    }
  });

  startBtn.addEventListener('click', () => {
    overlay.classList.add('hidden');
    reset();
    if (timer) clearInterval(timer);
    timer = setInterval(step, TICK_MS);
  });

  // initial paint
  reset();
})();
</script>
</body>
</html>
